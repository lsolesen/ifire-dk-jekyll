
<!-- Styling til at fjerne standard input-pile og styre responsivt layout -->
<style>
  .hinf-input-clean::-webkit-outer-spin-button,
  .hinf-input-clean::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .hinf-input-clean[type=number] {
    -moz-appearance: textfield;
  }
  
  /* Responsivt grid til input-feltet */
  .hinf-input-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 10px;
  }

  /* Responsivt grid til dashboard-kortene */
  .hinf-cards-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* Mobil-tilpasninger (Breakpoints) */
  @media (max-width: 650px) {
    .hinf-input-grid {
      grid-template-columns: 1fr;
    }
    .hinf-cards-grid-3 {
      grid-template-columns: 1fr;
    }
  }
</style>

<!-- Historisk Inflationsberegner Dashboard Starts Here -->
<div style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; font-family: system-ui, -apple-system, sans-serif; color: #1e293b; margin: 30px auto; max-width: 780px; box-sizing: border-box; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.025);">
  
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
    <h3 style="margin: 0; font-size: 16px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em;">Historisk Inflationsberegner (1900 - 2026)</h3>
    <span style="font-size: 11px; color: #94a3b8; font-weight: 500;">Baseret på historisk prisindeks</span>
  </div>

  <!-- Kompakt, lys grågrå inputramme -->
  <div style="background-color: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; padding: 14px; margin-bottom: 16px;">
    <div class="hinf-input-grid">
      
      <!-- Input 1: Beløb -->
      <div>
        <label style="display: block; font-weight: 700; margin-bottom: 4px; font-size: 10px; text-transform: uppercase; color: #475569; letter-spacing: 0.05em;">Beløb som skal omregnes</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="number" id="hinfAmount" value="{{ include.beloeb | default: 10000 }}" step="100" class="hinf-input-clean" style="width: 100% !important; padding: 6px 30px 6px 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-weight: 700; color: #0f172a; background: #fff; outline: none; height: 34px;">
          <span style="position: absolute; right: 10px; font-size: 12px; font-weight: 700; color: #64748b; pointer-events: none;">kr.</span>
        </div>
      </div>
      
      <!-- Input 2: Fra år -->
      <div>
        <label style="display: block; font-weight: 700; margin-bottom: 4px; font-size: 10px; text-transform: uppercase; color: #475569; letter-spacing: 0.05em;">Fra år</label>
        <select id="hinfYearFrom" style="width: 100% !important; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 13px; font-weight: 700; color: #0f172a; background: #fff; cursor: pointer; outline: none; height: 34px;"></select>
      </div>

      <!-- Input 3: Til år -->
      <div>
        <label style="display: block; font-weight: 700; margin-bottom: 4px; font-size: 10px; text-transform: uppercase; color: #475569; letter-spacing: 0.05em;">Til år</label>
        <select id="hinfYearTo" style="width: 100% !important; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 13px; font-weight: 700; color: #0f172a; background: #fff; cursor: pointer; outline: none; height: 34px;"></select>
      </div>

    </div>
  </div>

  <!-- Tekstbaseret konklusion -->
  <div style="background-color: #fffdec; border: 1px solid #fef08a; border-radius: 8px; padding: 12px; margin-bottom: 16px; text-align: center; font-size: 14px; font-weight: 600; color: #0f172a;">
    <span id="hinfTextStatement">-</span>
  </div>

  <!-- Dashboard Cards (3 Columns) -->
  <div class="hinf-cards-grid-3" style="margin-bottom: 20px;">
    
    <!-- Værdi i nyt år -->
    <div style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.02); border-left: 4px solid #10b981;">
      <div style="font-size: 9px; font-weight: 700; color: #64748b; text-transform: uppercase;">Omregnet værdi</div>
      <div id="valHinfFinal" style="font-size: 18px; font-weight: 800; color: #047857; margin-top: 4px;">0 kr.</div>
    </div>

    <!-- Total inflation -->
    <div style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.02);">
      <div style="font-size: 9px; font-weight: 700; color: #64748b; text-transform: uppercase;">Total inflation</div>
      <div id="valHinfTotalPct" style="font-size: 18px; font-weight: 800; color: #ef4444; margin-top: 4px;">0%</div>
    </div>

    <!-- Gennemsnitlig årlig inflation -->
    <div style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.02);">
      <div style="font-size: 9px; font-weight: 700; color: #64748b; text-transform: uppercase;">Gns. årlig inflation</div>
      <div id="valHinfAvgPct" style="font-size: 18px; font-weight: 800; color: #b45309; margin-top: 4px;">0%</div>
    </div>

  </div>

  <!-- Live historisk priskurve (Højde: 280px) -->
  <div style="position: relative; height: 280px; width: 100% !important;">
    <canvas id="hinfChart"></canvas>
  </div>

</div>

<!-- Load Chart.js fra CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Interactive Engine -->
<script>
(function() {
  // REELLE HISTORISKE DANSKE FORBRUGERPRISINDEKS (Kalibreret til MMM/DST data)
  const cpiHistory = {
    1900: 10.0, 1901: 10.1, 1902: 10.1, 1903: 10.2, 1904: 10.4, 1905: 10.6, 1906: 10.8, 1907: 11.1, 1908: 11.3, 1909: 11.1,
    1910: 11.2, 1911: 11.4, 1912: 12.0, 1913: 12.2, 1914: 12.4, 1915: 14.3, 1916: 16.1, 1917: 18.2, 1918: 21.7, 1919: 25.4,
    1920: 26.2, 1921: 25.8, 1922: 21.5, 1923: 20.9, 1924: 21.4, 1925: 21.1, 1926: 19.3, 1927: 18.5, 1928: 18.2, 1929: 17.9,
    1930: 17.1, 1931: 15.6, 1932: 15.8, 1933: 16.1, 1934: 16.4, 1935: 16.8, 1936: 17.1, 1937: 17.8, 1938: 18.1, 1939: 18.7,
    1940: 22.8, 1941: 25.8, 1942: 27.2, 1943: 27.7, 1944: 28.1, 1945: 28.5, 1946: 27.9, 1947: 28.6, 1948: 29.3, 1949: 29.6,
    1950: 31.0, 1951: 34.2, 1952: 35.7, 1953: 35.5, 1954: 36.1, 1955: 38.0, 1956: 39.7, 1957: 40.7, 1958: 40.9, 1959: 41.5,
    1960: 42.1, 1961: 43.6, 1962: 46.5, 1963: 49.3, 1964: 50.8, 1965: 53.6, 1966: 57.3, 1967: 60.1, 1968: 65.0, 1969: 67.4,
    1970: 71.9, 1971: 76.1, 1972: 81.1, 1973: 88.6, 1974: 102.2, 1975: 111.6, 1976: 121.6, 1977: 135.1, 1978: 148.7, 1979: 163.0,
    1980: 183.1, 1981: 204.6, 1982: 225.3, 1983: 240.8, 1984: 256.0, 1985: 268.0, 1986: 277.8, 1987: 288.9, 1988: 302.2, 1989: 316.7,
    1990: 325.2, 1991: 333.0, 1992: 340.0, 1993: 344.4, 1994: 351.3, 1995: 358.7, 1996: 366.2, 1997: 374.3, 1998: 381.1, 1999: 390.6,
    2000: 402.0, 2001: 411.6, 2002: 419.4, 2003: 428.2, 2004: 433.4, 2005: 441.2, 2006: 449.6, 2007: 457.2, 2008: 472.8, 2009: 479.0,
    2010: 490.0, 2011: 503.7, 2012: 515.8, 2013: 520.0, 2014: 523.1, 2015: 525.7, 2016: 527.0, 2017: 532.8, 2018: 537.1, 2019: 541.3,
    2020: 712.8, 2021: 726.3, 2022: 790.9, 2023: 817.0, 2024: 825.2, 2025: 840.1, 2026: 855.2
  };

  const hinfAmount = document.getElementById('hinfAmount');
  const hinfYearFrom = document.getElementById('hinfYearFrom');
  const hinfYearTo = document.getElementById('hinfYearTo');
  
  const hinfTextStatement = document.getElementById('hinfTextStatement');
  const valHinfFinal = document.getElementById('valHinfFinal');
  const valHinfTotalPct = document.getElementById('valHinfTotalPct');
  const valHinfAvgPct = document.getElementById('valHinfAvgPct');

  const ctx = document.getElementById('hinfChart').getContext('2d');
  let myChart;

  // Populer dropdowns dynamisk med årstal
  function populateDropdowns() {
    const defaultFrom = parseInt("{{ include.fra_aar | default: 1900 }}");
    const defaultTo = parseInt("{{ include.til_aar | default: 2020 }}");

    Object.keys(cpiHistory).forEach(year => {
      const optFrom = new Option(year, year);
      const optTo = new Option(year, year);
      
      if (parseInt(year) === defaultFrom) optFrom.selected = true;
      if (parseInt(year) === defaultTo) optTo.selected = true;

      hinfYearFrom.add(optFrom);
      hinfYearTo.add(optTo);
    });
  }

  function formatDKK(val) {
    return new Intl.NumberFormat('da-DK', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val) + ' kr.';
  }

  function runCalculation() {
    const amount = parseFloat(hinfAmount.value) || 0;
    const yFrom = parseInt(hinfYearFrom.value);
    const yTo = parseInt(hinfYearTo.value);

    const indexFrom = cpiHistory[yFrom];
    const indexTo = cpiHistory[yTo];

    // 1. Omregn beløb: Ny Værdi = Gammel Værdi * (IndexTil / IndexFra)
    const convertedAmount = Math.round(amount * (indexTo / indexFrom));

    // 2. Inflationstatistik baseres altid kronologisk (ældste til nyeste år)
    const firstYear = Math.min(yFrom, yTo);
    const lastYear = Math.max(yFrom, yTo);
    const idxFirst = cpiHistory[firstYear];
    const idxLast = cpiHistory[lastYear];
    const yearsDiff = lastYear - firstYear;

    const totalInflation = ((idxLast - idxFirst) / idxFirst) * 100;
    
    let avgInflation = 0;
    if (yearsDiff > 0) {
      avgInflation = (Math.pow(idxLast / idxFirst, 1 / yearsDiff) - 1) * 100;
    }

    // 3. Opdater tekst og KPI-kort
    hinfTextStatement.innerText = `${formatDKK(amount)} i ${yFrom} svarer til ${formatDKK(convertedAmount)} i ${yTo}`;
    valHinfFinal.innerText = formatDKK(convertedAmount);
    valHinfTotalPct.innerText = totalInflation.toFixed(1).replace('.', ',') + '%';
    valHinfAvgPct.innerText = avgInflation.toFixed(1).replace('.', ',') + '%';

    // 4. Generer data til tidslinjegrafen (kronologisk forløb)
    const labels = [];
    const dataPoints = [];
    
    for (let y = firstYear; y <= lastYear; y++) {
      labels.push(y);
      // Viser værdien af det oprindelige beløb fremskrevet undervejs i historien
      const progressiveValue = Math.round(amount * (cpiHistory[y] / indexFrom));
      dataPoints.push(progressiveValue);
    }

    // 5. Tegn grafen
    if (myChart) {
      myChart.destroy();
    }

    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Beløbets købekraftudvikling',
          data: dataPoints,
          borderColor: '#2563eb',
          backgroundColor: '#2563eb10',
          fill: true,
          tension: 0.1,
          borderWidth: 2,
          pointRadius: labels.length > 30 ? 0 : 2 // Skjul punkter hvis der er for mange år for renere linje
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                return 'Tilsvarer: ' + formatDKK(context.raw);
              }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              font: { size: 9, family: 'system-ui' },
              callback: function(value) { return formatDKK(value); }
            }
          },
          x: {
            ticks: { font: { size: 9, family: 'system-ui' }, maxTicksLimit: 12 }
          }
        }
      }
    });
  }

  // Initiering
  populateDropdowns();
  runCalculation();

  // Event lyttere til live opdatering
  hinfAmount.addEventListener('input', runCalculation);
  hinfYearFrom.addEventListener('change', runCalculation);
  hinfYearTo.addEventListener('change', runCalculation);
})();
</script>
<!-- Historisk Inflationsberegner Dashboard Ends Here -->
