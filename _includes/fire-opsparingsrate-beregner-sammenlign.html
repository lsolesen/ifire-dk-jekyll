<!-- Calculator Code -->
<script>
(function() {
  // Inputs
  const mmmsSavedPct = document.getElementById('mmmsSavedPct');
  const mmmsReturn = document.getElementById('mmmsReturn');
  const mmmsSWR = document.getElementById('mmmsSWR');
  const mmmsRate1 = document.getElementById('mmmsRate1');
  const mmmsRate2 = document.getElementById('mmmsRate2');

  // Outputs
  const statTime1 = document.getElementById('statTime1');
  const statTime2 = document.getElementById('statTime2');
  const statDiff = document.getElementById('statDiff');
  
  const ctx = document.getElementById('mmmsCurveChart').getContext('2d');
  let myChart;

  // Matematik-funktioner
  function calculateYearsToFIRE(p, r, swr, k) {
    if (k >= 1) return 0;
    if (p <= 0) return Infinity;
    if (p >= 1) return 0;
    
    if (r === 0) {
      return (1 - k) * (1 - p) / (p * swr);
    }
    
    const numerator = ((1 - p) / swr) * r + p;
    const denominator = k * ((1 - p) / swr) * r + p;
    
    if (denominator <= 0 || numerator <= 0) return Infinity;
    return Math.log(numerator / denominator) / Math.log(1 + r);
  }

  function getRateForYears(N, r, swr, k) {
    if (k >= 1) return 0;
    if (N <= 0) return 100;
    
    const A = Math.pow(1 + r, N);
    const B = r / swr;
    
    if (r === 0) {
      return ((1 - k) / (N * swr + 1 - k)) * 100;
    }
    
    const numerator = B * (A * k - 1);
    const denominator = A * k * B - A - B + 1;
    
    const p = numerator / denominator;
    return Math.max(0, Math.min(100, p * 100));
  }

  function formatYears(years) {
    if (years === Infinity) return "For evigt 🤖";
    if (years === 0) return "0 år 🕊️";
    if (years % 1 === 0) return years.toFixed(0) + " år";
    return years.toFixed(1).replace('.', ',') + " år";
  }

  function runComparison() {
    // Globale variabler
    const savedPct = (parseFloat(mmmsSavedPct.value) || 0) / 100;
    const expectedReturn = (parseFloat(mmmsReturn.value) || 0) / 100;
    const swr = (parseFloat(mmmsSWR.value) || 0) / 100;

    // Opsparingsrater
    const rate1 = (parseFloat(mmmsRate1.value) || 0) / 100;
    const rate2 = (parseFloat(mmmsRate2.value) || 0) / 100;

    // 1. Beregn år til FIRE for begge
    const years1 = calculateYearsToFIRE(rate1, expectedReturn, swr, savedPct);
    const years2 = calculateYearsToFIRE(rate2, expectedReturn, swr, savedPct);

    statTime1.innerText = formatYears(years1);
    statTime2.innerText = formatYears(years2);

    // 2. Beregn forskel
    if (isFinite(years1) && isFinite(years2)) {
      const diff = Math.abs(years1 - years2);
      statDiff.innerText = formatYears(diff);
    } else {
      statDiff.innerText = "-";
    }

    // 3. Beregn x-akse dynamisk
    let xMax = 50;
    if (savedPct > 0 && expectedReturn > 0) {
      const zeroRateYears = Math.log(1 / savedPct) / Math.log(1 + expectedReturn);
      xMax = Math.min(50, Math.max(10, Math.ceil(zeroRateYears * 1.15)));
    }

    // 4. Generer hovedkurven (Grå baggrundskurve)
    const curvePoints = [];
    for (let N = 0.5; N <= xMax; N += 0.5) {
      const p = getRateForYears(N, expectedReturn, swr, savedPct);
      if (p >= 0 && p <= 100) {
        curvePoints.push({ x: N, y: p });
      }
    }

    // 5. Opret punkterne for Scenarie 1 og Scenarie 2
    const point1 = isFinite(years1) && years1 > 0 ? [{ x: years1, y: rate1 * 100 }] : (years1 === 0 ? [{ x: 0, y: rate1 * 100 }] : []);
    const point2 = isFinite(years2) && years2 > 0 ? [{ x: years2, y: rate2 * 100 }] : (years2 === 0 ? [{ x: 0, y: rate2 * 100 }] : []);

    // 6. Tegn grafen
    if (myChart) {
      myChart.destroy();
    }

    myChart = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: 'Matematisk kurve',
            data: curvePoints,
            showLine: true,
            borderColor: '#94a3b8', // Neutral grå kurve
            backgroundColor: '#f1f5f950',
            fill: true,
            tension: 0.15,
            borderWidth: 2,
            pointRadius: 0
          },
          {
            label: 'Scenarie 1 (Blå)',
            data: point1,
            showLine: false,
            borderColor: '#2563eb',
            backgroundColor: '#2563eb',
            pointRadius: 7,
            pointHoverRadius: 10,
            pointStyle: 'circle'
          },
          {
            label: 'Scenarie 2 (Rød)',
            data: point2,
            showLine: false,
            borderColor: '#dc2626',
            backgroundColor: '#dc2626',
            pointRadius: 7,
            pointHoverRadius: 10,
            pointStyle: 'circle'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                if (context.datasetIndex === 1) {
                  return 'S1: ' + context.raw.y.toFixed(0) + '% giver ' + context.raw.x.toFixed(1).replace('.', ',') + ' år';
                } else if (context.datasetIndex === 2) {
                  return 'S2: ' + context.raw.y.toFixed(0) + '% giver ' + context.raw.x.toFixed(1).replace('.', ',') + ' år';
                }
                return 'Ved ' + context.raw.x.toFixed(1).replace('.', ',') + ' år kræves ' + context.raw.y.toFixed(1).replace('.', ',') + '% rate';
              }
            }
          }
        },
        scales: {
          x: {
            type: 'linear',
            min: 0,
            max: xMax,
            title: {
              display: true,
              text: 'Arbejdsår tilbage',
              font: { size: 10, weight: 'bold', family: 'system-ui' }
            },
            ticks: { font: { size: 9, family: 'system-ui' } }
          },
          y: {
            min: 0,
            max: 100,
            title: {
              display: true,
              text: 'Opsparingsrate (%)',
              font: { size: 10, weight: 'bold', family: 'system-ui' }
            },
            ticks: { font: { size: 9, family: 'system-ui' } }
          }
        }
      }
    });
  }

  // Live lyttere
  const inputs = [mmmsSavedPct, mmmsReturn, mmmsSWR, mmmsRate1, mmmsRate2];
  inputs.forEach(el => el.addEventListener('input', runComparison));

  // Initial kørsel
  runComparison();
})();
</script>
