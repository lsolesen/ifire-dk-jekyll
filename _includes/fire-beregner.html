<!-- Styling til at fjerne standard input-pile og styre responsivt layout -->
<style>
  .fire-input-clean::-webkit-outer-spin-button,
  .fire-input-clean::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .fire-input-clean[type=number] {
    -moz-appearance: textfield;
  }
  
  /* Responsivt grid til input-blokken */
  .fire-input-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr 0.8fr;
    gap: 10px;
  }

  /* Responsivt grid til KPI-kortene */
  .fire-cards-grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  /* Mobil-tilpasninger (Breakpoints) */
  @media (max-width: 768px) {
    .fire-input-grid {
      grid-template-columns: 1fr 1fr;
    }
    .fire-cards-grid-4 {
      grid-template-columns: 1fr 1fr;
    }
  }
  @media (max-width: 480px) {
    .fire-input-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<!-- Interactive Engine -->
<script>
(function() {
  const inpConsumption = document.getElementById('inpConsumption');
  const inpSavings = document.getElementById('inpSavings');
  const inpMonthly = document.getElementById('inpMonthly');
  const inpReturn = document.getElementById('inpReturn');
  
  const inputSWR = document.getElementById('inputSWR');
  const inputTax = document.getElementById('inputTax');

  // Outputs
  const valTarget = document.getElementById('valTarget');
  const valRemaining = document.getElementById('valRemaining');
  const valSavingsRate = document.getElementById('valSavingsRate');
  const valPct = document.getElementById('valPct');
  const progressBar = document.getElementById('progressBar');
  const valTimeResult = document.getElementById('valTimeResult');

  const ctx = document.getElementById('fireChart').getContext('2d');
  let myChart;

  function formatDKK(val) {
    return new Intl.NumberFormat('da-DK', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val) + ' kr.';
  }

  function runCalculation() {
    // 1. Inputs
    const consumption = parseFloat(inpConsumption.value) || 0;
    const currentSavings = parseFloat(inpSavings.value) || 0;
    const monthlySave = parseFloat(inpMonthly.value) || 0;
    const expectedReturn = (parseFloat(inpReturn.value) || 0) / 100;
    
    const swr = (parseFloat(inputSWR.value) || 4) / 100;
    const taxRate = (parseFloat(inputTax.value) || 0) / 100;

    // 2. Target calculation (FIRE-mål)
    const annualConsumption = consumption * 12;
    const netTarget = annualConsumption / swr;
    const target = taxRate < 1 ? Math.round(netTarget / (1 - taxRate)) : netTarget;

    const remaining = Math.max(0, target - currentSavings);
    const pct = target > 0 ? Math.min(100, (currentSavings / target) * 100) : 100;

    // 3. Opsparingsrate
    const totalNetIncome = monthlySave + consumption;
    const savingsRate = totalNetIncome > 0 ? (monthlySave / totalNetIncome) * 100 : 0;

    // Update static outputs
    valTarget.innerText = formatDKK(target);
    valRemaining.innerText = formatDKK(remaining);
    valSavingsRate.innerText = savingsRate.toFixed(1).replace('.', ',') + '%';
    valPct.innerText = pct.toFixed(1).replace('.', ',') + '% nået';
    progressBar.style.width = pct + '%';

    // 4. Time to FIRE math
    let totalMonths = 0;
    let timeText = "";
    let isIndependent = false;

    if (currentSavings >= target) {
      timeText = "Du er økonomisk uafhængig! 🎉";
      isIndependent = true;
    } else {
      const r = expectedReturn / 12; // Månedligt afkast
      const PV = currentSavings;
      const PMT = monthlySave;
      const FV = target;

      if (PMT <= 0 && PV * r <= 0) {
        timeText = "Uendelig (ingen opsparing/afkast)";
      } else {
        if (PV * r + PMT <= 0) {
          timeText = "Uendelig (opsparingen svinder ind)";
        } else {
          let n = 0;
          if (r === 0) {
            n = (FV - PV) / PMT;
          } else {
            const numerator = FV * r + PMT;
            const denominator = PV * r + PMT;
            if (denominator <= 0 || numerator <= 0) {
              n = Infinity;
            } else {
              n = Math.log(numerator / denominator) / Math.log(1 + r);
            }
          }

          if (!isFinite(n) || n < 0) {
            timeText = "Spar mere op";
          } else {
            totalMonths = Math.ceil(n);
            const years = Math.floor(totalMonths / 12);
            const months = totalMonths % 12;

            if (years === 0) {
              timeText = `${months} mdr.`;
            } else {
              timeText = `Ca. ${years} år og ${months} mdr.`;
            }
          }
        }
      }
    }

    valTimeResult.innerText = timeText;

    // 5. Generate Chart Data
    const chartLabels = ['År 0'];
    const growthData = [currentSavings];
    const targetData = [target];

    let yearsToPlot = 30;
    if (isIndependent) {
      yearsToPlot = 10;
    } else if (totalMonths > 0) {
      yearsToPlot = Math.min(50, Math.ceil(totalMonths / 12));
    }

    let tempBalance = currentSavings;
    const mRate = expectedReturn / 12;

    for (let y = 1; y <= yearsToPlot; y++) {
      for (let m = 0; m < 12; m++) {
        tempBalance += tempBalance * mRate;
        tempBalance += monthlySave;
      }
      chartLabels.push('År ' + y);
      growthData.push(tempBalance);
      targetData.push(target);
    }

    // 6. Render Chart.js
    if (myChart) {
      myChart.destroy();
    }

    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [
          {
            label: 'Din opsparing',
            data: growthData,
            borderColor: '#10b981',
            backgroundColor: '#10b98115',
            fill: true,
            tension: 0.1,
            borderWidth: 2.5
          },
          {
            label: 'FIRE-mål',
            data: targetData,
            borderColor: '#ef4444',
            borderDash: [6, 6],
            fill: false,
            tension: 0,
            borderWidth: 1.5,
            pointRadius: 0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { boxWidth: 12, font: { size: 11, family: 'system-ui' } }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            callbacks: {
              label: function(context) {
                return context.dataset.label + ': ' + formatDKK(context.raw);
              }
            }
          }
        },
        scales: {
          y: {
            ticks: {
              font: { size: 10, family: 'system-ui' },
              callback: function(value) { return formatDKK(value); }
            }
          },
          x: {
            ticks: { font: { size: 10, family: 'system-ui' } }
          }
        }
      }
    });
  }

  // Live recalculation event listeners
  const inputs = [inpConsumption, inpSavings, inpMonthly, inpReturn, inputSWR, inputTax];
  inputs.forEach(el => el.addEventListener('input', runCalculation));

  // Initial Calculation
  runCalculation();
})();
</script>
